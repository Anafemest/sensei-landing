<body>
  <!-- Hash redirect: renamed anchors -->
  <script>
    (function () {
      var hash = window.location.hash;
      if (!hash) return;
      var renames = { '#anatomy': '#what-is', '#flow': '#how-it-works', '#industries': '#case-studies' };
      var deprecated = ['#comparison', '#value', '#integrations', '#deployment', '#security'];
      if (renames[hash]) history.replaceState(null, '', renames[hash]);
      else if (deprecated.indexOf(hash) !== -1) history.replaceState(null, '', window.location.pathname);
    })();
  </script>

  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Shared: icons, brand mark -->
  <script src="../components/scenarios.js"></script>
  <script type="text/babel" src="../components/icons.jsx"></script>
  <script type="text/babel" src="../components/Brand.jsx"></script>

  <!-- EN-specific components -->
  <script src="components/scenarios.js"></script>
  <script type="text/babel" src="components/Nav.jsx?v=2"></script>
  <script type="text/babel" src="components/Hero.jsx?v=2"></script>
  <script type="text/babel" src="components/Stats.jsx?v=2"></script>
  <script type="text/babel" src="components/Anatomy.jsx?v=4"></script>
  <script type="text/babel" src="components/Transformations.jsx?v=3"></script>
  <script type="text/babel" src="components/Tracks.jsx"></script>
  <script type="text/babel" src="components/Flow.jsx?v=4"></script>
  <script type="text/babel" src="components/Cases.jsx"></script>
  <script type="text/babel" src="components/Team.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <div className="page">
          <Nav />
          <Hero />
          <Stats />
          <Transformations />
          <Anatomy />
          <Tracks />
          <Flow />
          <Cases />
          <Team />
          <Testimonials />
          <CTA />
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);

    // Scroll to hash after React renders (polling until element appears).
    (function scrollToHash() {
      const hash = window.location.hash;
      if (!hash) return;
      const el = document.querySelector(hash);
      if (el) { el.scrollIntoView({ behavior: 'auto' }); }
      else { setTimeout(scrollToHash, 80); }
    })();
  </script>
</body>
